<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | samir.guru</title>
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Sora', system-ui, sans-serif;
    background: #0f0d0a;
    color: #f5f0e6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 480px; }
  .code {
    font-size: clamp(4rem, 12vw, 7rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #10b981 0%, #6ee7b7 50%, #d4b896 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
  }
  p {
    font-size: 0.88rem;
    color: #8a7e6c;
    font-weight: 300;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.76rem 1.6rem;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    text-decoration: none;
    background: #10b981;
    color: #0a0f0d;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 0 20px rgba(16,185,129,0.15);
  }
  a:hover {
    background: #34d399;
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(16,185,129,0.25), 0 0 60px rgba(16,185,129,0.12);
  }
  a svg { width: 13px; height: 13px; transition: transform 0.3s; }
  a:hover svg { transform: translateX(3px); }
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">
    Back to home
    <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
</div>
</body>
</html>
